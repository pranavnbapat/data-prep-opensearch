services:
  data-prep-opensearch-mysql:
    image: mysql:8.4
    container_name: data-prep-opensearch-mysql
    env_file:
      - .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - ./mysql_data:/var/lib/mysql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  data-prep-opensearch-phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: data-prep-opensearch-phpmyadmin
    depends_on:
      data-prep-opensearch-mysql:
        condition: service_healthy
    environment:
      PMA_HOST: data-prep-opensearch-mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "8401:80"
    restart: always

  data-prep-opensearch-clamav:
    image: clamav/clamav:stable
    container_name: data-prep-opensearch-clamav
    restart: always
    environment:
      CLAMAV_NO_FRESHCLAMD: "false"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 60s
      timeout: 15s
      retries: 10
      start_period: 120s

  data-prep-opensearch:
    build:
      context: .
    image: ghcr.io/pranavnbapat/data-prep-opensearch:latest
    container_name: data-prep-opensearch
    command: ["uvicorn", "api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    depends_on:
      data-prep-opensearch-mysql:
        condition: service_healthy
      data-prep-opensearch-clamav:
        condition: service_started
    ports:
      - "8400:8000"
    volumes:
      - ./output:/app/output
    restart: always
    user: "${UID}:${GID}"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=3).status==200 else sys.exit(1)\"" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

